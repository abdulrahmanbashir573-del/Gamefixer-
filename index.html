<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر الأكواد أونلاين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        #editor-container { height: 50vh; }
        .console-output { 
            background: #1e1e1e; 
            font-family: 'Courier New', monospace; 
            max-height: 30vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <!-- الشريط العلوي -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-lg">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-purple-600 p-2 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                    محرر بايثون
                </h1>
            </div>
            
            <div class="flex gap-3">
                <button onclick="runCode()" id="runBtn" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg font-semibold transition flex items-center gap-2">
                    <span>▶ تشغيل</span>
                </button>
                <button onclick="clearCode()" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-lg font-semibold transition">
                    مسح
                </button>
            </div>
        </div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="container mx-auto p-4">
        <!-- حالة التحميل -->        <div id="loading" class="bg-blue-900/50 border border-blue-500 rounded-lg p-4 mb-4 text-center">
            <div class="animate-pulse">جاري تحميل بايثون... يرجى الانتظار</div>
            <div class="text-sm text-blue-300 mt-2">قد يستغرق دقيقة في أول مرة</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            
            <!-- المحرر -->
            <div class="bg-gray-800 rounded-xl overflow-hidden shadow-2xl border border-gray-700">
                <div class="bg-gray-700 px-4 py-2 flex items-center justify-between">
                    <span class="text-gray-400 text-sm">main.py</span>
                </div>
                <div id="editor-container"></div>
            </div>

            <!-- الكونسول -->
            <div class="bg-gray-800 rounded-xl overflow-hidden shadow-2xl border border-gray-700">
                <div class="bg-gray-700 px-4 py-3">
                    <h2 class="font-semibold text-green-400">المخرجات</h2>
                </div>
                <div id="console" class="console-output p-4 text-green-400 text-sm h-full min-h-[200px]">
                    <div class="text-gray-500">في انتظار التنفيذ...</div>
                </div>
            </div>
        </div>

        <!-- أمثلة -->
        <div class="mt-6 bg-gray-800 rounded-xl p-6 border border-gray-700">
            <h3 class="text-lg font-semibold mb-4 text-purple-400">أمثلة:</h3>
            <div class="flex gap-3 flex-wrap">
                <button onclick="setExample('hello')" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg transition">
                    Hello World
                </button>
                <button onclick="setExample('calc')" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg transition">
                    آلة حاسبة
                </button>
                <button onclick="setExample('loop')" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg transition">
                    Loop
                </button>
            </div>
        </div>
    </main>

    <!-- تحميل Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <!-- تحميل Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    
    <script>
        let editor;        let pyodide = null;
        let isPyodideLoading = false;

        // تهيئة المحرر
        require.config({ 
            paths: { 
                vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' 
            } 
        });

        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: '# اكتب كود بايثون هنا\nprint("Hello World!")\n',
                language: 'python',
                theme: 'vs-dark',
                fontSize: 14,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                automaticLayout: true
            });
        });

        // تحميل Pyodide مرة واحدة
        async function initPyodide() {
            if (pyodide || isPyodideLoading) return pyodide;
            
            isPyodideLoading = true;
            try {
                pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
                });
                document.getElementById('loading').style.display = 'none';
                addToConsole('✅ جاهز للتشغيل!');
                return pyodide;
            } catch (error) {
                addToConsole('❌ خطأ في التحميل: ' + error.message, 'error');
                isPyodideLoading = false;
                return null;
            }
        }

        // تشغيل الكود
        async function runCode() {
            const runBtn = document.getElementById('runBtn');
            const code = editor.getValue();
            
            if (!code.trim()) {
                addToConsole('⚠️ اكتب كود أولاً!', 'error');
                return;
            }
            runBtn.innerHTML = '<span>⏳ جاري التنفيذ...</span>';
            runBtn.disabled = true;
            
            try {
                // تحميل Pyodide لو مش محمل
                if (!pyodide) {
                    await initPyodide();
                    if (!pyodide) {
                        runBtn.innerHTML = '<span>▶ تشغيل</span>';
                        runBtn.disabled = false;
                        return;
                    }
                }

                addToConsole('🚀 executing...\n' + '='.repeat(40));
                
                // تشغيل الكود
                await pyodide.runPythonAsync(code);
                
            } catch (error) {
                addToConsole('❌ Error: ' + error.message, 'error');
            } finally {
                runBtn.innerHTML = '<span>▶ تشغيل</span>';
                runBtn.disabled = false;
            }
        }

        // إضافة للكونسول
        function addToConsole(text, type = 'normal') {
            const consoleDiv = document.getElementById('console');
            if (consoleDiv.children[0]?.textContent === 'في انتظار التنفيذ...') {
                consoleDiv.innerHTML = '';
            }
            
            const line = document.createElement('div');
            line.className = 'mb-2 ' + (type === 'error' ? 'text-red-400' : 'text-green-400');
            line.textContent = text;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        // مسح الكود
        function clearCode() {
            editor.setValue('');
            document.getElementById('console').innerHTML = '<div class="text-gray-500">في انتظار التنفيذ...</div>';
        }

        // الأمثلة
        function setExample(type) {            const examples = {
                hello: 'print("Hello World!")\nname = input("What is your name? ")\nprint(f"Welcome {name}!")',
                calc: 'num1 = 10\nnum2 = 5\nprint(f"{num1} + {num2} = {num1 + num2}")\nprint(f"{num1} * {num2} = {num1 * num2}")',
                loop: 'for i in range(1, 6):\n    print(f"Count: {i}")\nprint("Done!")'
            };
            
            if (editor && examples[type]) {
                editor.setValue(examples[type]);
            }
        }

        // تهيئة Pyodide عند التحميل
        window.addEventListener('load', () => {
            initPyodide();
        });
    </script>
</body>
</html>
